# ============================================================================
# Production nginx config — sits in front of the API.
# Place at /etc/nginx/sites-available/hajerypulse and symlink into sites-enabled.
# ============================================================================

upstream hajerypulse_api {
    least_conn;
    server 10.0.10.21:5001 max_fails=3 fail_timeout=30s;
    server 10.0.10.22:5001 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# Rate limiting — 100/min for /api, 10/min for /auth
limit_req_zone $binary_remote_addr zone=api_zone:10m  rate=100r/m;
limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=10r/m;

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name api.hajerypulse.internal;
    return 301 https://$server_name$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    server_name api.hajerypulse.internal;

    # TLS — replace paths with your internal CA-signed cert
    ssl_certificate     /etc/ssl/hajerypulse/api.crt;
    ssl_certificate_key /etc/ssl/hajerypulse/api.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Body size + timeouts
    client_max_body_size 10m;
    proxy_read_timeout 30s;
    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;

    # Auth endpoints — stricter rate limit
    location /api/v1/auth/ {
        limit_req zone=auth_zone burst=5 nodelay;
        proxy_pass http://hajerypulse_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Main API
    location /api/ {
        limit_req zone=api_zone burst=20 nodelay;
        proxy_pass http://hajerypulse_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health (no rate limit)
    location /health {
        proxy_pass http://hajerypulse_api;
        access_log off;
    }

    # Block everything else
    location / { return 404; }
}
