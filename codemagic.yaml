workflows:
  android-debug:
    name: Android Debug Build
    max_build_duration: 30
    environment:
      node: 20
      vars:
        PROJECT_PATH: mobile
    scripts:
      - name: Install dependencies
        script: |
          cd $PROJECT_PATH
          npm install
      - name: Build Android debug APK
        script: |
          cd $PROJECT_PATH/android
          ./gradlew assembleDebug
    artifacts:
      - mobile/android/app/build/outputs/**/*.apk

  android-release:
    name: Android Release Build (for Appetize comparison test)
    max_build_duration: 30
    environment:
      node: 20
      vars:
        PROJECT_PATH: mobile
    scripts:
      - name: Install dependencies
        script: |
          cd $PROJECT_PATH
          npm ci
      - name: Build Android release APK
        script: |
          cd $PROJECT_PATH/android
          ./gradlew assembleRelease
    artifacts:
      - mobile/android/app/build/outputs/**/*.apk

  ios-simulator-build:
    name: iOS Simulator Build (No Signing)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 20
      groups:
        - appetize
      vars:
        PROJECT_PATH: mobile
        XCODE_WORKSPACE: "HajeryPulse.xcworkspace"   # adjust to match your actual .xcworkspace filename inside mobile/ios/
        XCODE_SCHEME: "HajeryPulse"                   # adjust to match your actual Xcode scheme name
    scripts:
      - name: Install npm dependencies
        script: |
          cd $PROJECT_PATH
          npm ci

      - name: Install CocoaPods dependencies
        script: |
          cd $PROJECT_PATH/ios
          pod install

      - name: Build for iOS Simulator
        script: |
          cd $PROJECT_PATH/ios
          xcodebuild clean \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME"
          xcodebuild build \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphonesimulator \
            -derivedDataPath ../build \
            CODE_SIGNING_ALLOWED=NO

      - name: Zip .app for Appetize upload
        script: |
          cd $PROJECT_PATH/build/Build/Products/Release-iphonesimulator
          APP_NAME=$(ls -d *.app)
          echo "Found app: $APP_NAME"
          zip -r "$APP_NAME.zip" "$APP_NAME"

      - name: Upload to Appetize.io
        script: |
          cd $PROJECT_PATH/build/Build/Products/Release-iphonesimulator
          APP_ZIP=$(ls -d *.app.zip)
          echo "Uploading: $APP_ZIP"
          RESPONSE=$(curl -s -X POST https://api.appetize.io/v1/apps \
            -H "X-API-KEY: $APPETIZE_API_TOKEN" \
            -F "file=@$APP_ZIP" \
            -F "platform=ios")
          echo "$RESPONSE"
          PUBLIC_URL=$(echo "$RESPONSE" | grep -o '"publicURL":"[^"]*' | cut -d'"' -f4)
          echo "Appetize test link: $PUBLIC_URL"

    artifacts:
      - mobile/build/Build/Products/Release-iphonesimulator/*.app

    publishing:
      email:
        recipients:
          - keerthana.gopinath@hajery.com   # replace with your email
        notify:
          success: true
          failure: true

  ios-testflight:
    name: iOS TestFlight Release Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      node: 20
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.hajerypulse
      vars:
        PROJECT_PATH: mobile
        XCODE_WORKSPACE: "HajeryPulse.xcworkspace"   # adjust to match your actual .xcworkspace filename inside mobile/ios/
        XCODE_SCHEME: "HajeryPulse"                   # adjust to match your actual Xcode scheme name
        APP_STORE_APPLE_ID: 6792645958                # TODO: replace with your app's Apple ID from App Store Connect (found in App Information)
    scripts:
      - name: Install npm dependencies
        script: |
          cd $PROJECT_PATH
          npm ci

      - name: Install CocoaPods dependencies
        script: |
          cd $PROJECT_PATH/ios
          pod install

      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "com.hajerypulse" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Build ipa for distribution
        script: |
          cd $PROJECT_PATH/ios
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - mobile/ios/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - keerthana.gopinath@hajery.com   # replace with your email
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true